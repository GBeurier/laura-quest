name: Deploy game to GitHub Pages

# Le "build" = ré-embarquer les assets en base64 (gen_assets_data.py), puis publier
# le site statique sur GitHub Pages. Se lance automatiquement à chaque push sur main.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions nécessaires au déploiement Pages via Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on annule les runs en cours dépassés.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build — ré-embarquer les assets (js/assets_data.js)
        run: python3 gen_assets_data.py

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
