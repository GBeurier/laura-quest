<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>corpse probe</title></head>
<body>
<script src="engine/kaplay.js"></script>
<script src="js/assets_data.js"></script>
<script src="js/config.js"></script>
<script src="js/levels_data.js"></script>
<script src="js/level.js"></script>
<script src="js/save.js"></script>
<script src="js/bosses.js"></script>
<script src="js/mobile.js"></script>
<script src="js/game.js"></script>
<script>
(function () {
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;top:4px;left:4px;z-index:99999;background:#000;color:#0f0;' +
    'font:bold 26px monospace;padding:10px 14px;white-space:pre;';
  div.textContent = 'BOOT...';
  document.body.appendChild(div);

  let errs = 0, lastErr = '';
  window.addEventListener('error', (ev) => { errs++; lastErr = String(ev.message).slice(0, 70); });

  let killed = false, killFrame = -1, tick = 0;
  setInterval(() => {
    tick++;
    try {
      if (!(window.LQ && LQ.player && LQ.player.exists && LQ.player.exists())) {
        div.textContent = 'WAIT GAME... t' + tick + ' E:' + errs + ' ' + lastErr;
        return;
      }
      LQ.player._god = true;                  // survit pendant tout le probe
      const pass = get('passant');
      if (!killed && pass.length > 0) { LQ.kill(); killed = true; killFrame = tick; }
      const corpses = get('corpse');
      const withArea = corpses.filter((c) => c.c('area')).length;
      const withBody = corpses.filter((c) => c.c('body')).length;
      div.textContent =
        'PASSANTS:' + pass.length +
        ' CORPSES:' + corpses.length +
        '\nAREA:' + withArea + ' BODY:' + withBody +
        '\nKILLED:' + (killed ? ('t' + killFrame) : 'no') + ' now t' + tick +
        '\nERRORS:' + errs + ' ' + lastErr;
    } catch (ex) {
      div.textContent = 'PROBE EXC: ' + ex.message;
    }
  }, 200);
})();
</script>
</body>
</html>
