<!DOCTYPE html>
<html lang="fr">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laura Quest</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #1b2330;

    }
    canvas { image-rendering: auto; box-shadow: 0 10px 40px rgba(0,0,0,.5); border-radius: 8px; }

  <!-- Donnees : reglages puis niveaux -->
  <script src="js/config.js"></script>
  <script src="js/level.js"></script>
  <!-- Jeu -->
  <script src="js/game.js"></script>
