<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Laura l'exploratrice</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #1b2330;
      display: flex; align-items: center; justify-content: center;
      font-family: system-ui, sans-serif; overflow: hidden;
    }
    canvas { image-rendering: auto; box-shadow: 0 10px 40px rgba(0,0,0,.5); border-radius: 8px; }
    #note { position: fixed; bottom: 8px; left: 0; right: 0; text-align: center;
            color: #6b7686; font-size: 12px; }
  </style>
</head>
<body>
  <!-- Moteur (embarque en local, aucune connexion requise) -->
  <script src="engine/kaplay.js"></script>
  <!-- Assets embarques en base64 (le jeu marche sans serveur, en file://).
       Genere par gen_assets_data.py. Si absent, le jeu charge depuis assets/. -->
  <script src="js/assets_data.js"></script>
  <!-- Donnees : reglages puis niveaux -->
  <script src="js/config.js"></script>
  <!-- Grilles ASCII des niveaux (source = levels/*.txt, embarquees par
       gen_levels_data.py). AVANT level.js qui lit window.LEVEL_MAPS. -->
  <script src="js/levels_data.js"></script>
  <script src="js/level.js"></script>
  <!-- Registre des PNJ (prenom/nom/taille/phrases par tete). AVANT game.js
       qui lit window.NPC pour la taille (et demain les phrases) des passants. -->
  <script src="js/npc.js"></script>
  <!-- Sauvegardes (3 slots) + IA des boss -->
  <script src="js/save.js"></script>
  <script src="js/bosses.js"></script>
  <!-- Manette tactile (web mobile) : detection + overlay. AVANT game.js car il
       pose window.LQ_TOUCH que kaplay() lit pour activer le letterbox mobile. -->
  <script src="js/mobile.js"></script>
  <!-- Jeu -->
  <script src="js/game.js"></script>
  <div id="note">Laura l'exploratrice — le PhD agrivoltaique</div>
</body>
</html>
